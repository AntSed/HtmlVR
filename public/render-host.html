<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HtmlVR - Render Host</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="webm-muxer.js"></script>
    <script src="js/render-audio.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #18181b; /* Charcoal workspace background */
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #frame-background {
            position: absolute;
            background-color: #000000; /* True black for video area */
            left: 50%;
            top: 50%;
            transform-origin: center center;
            pointer-events: none;
            z-index: 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        #frame-outline {
            position: absolute;
            border: 1px dashed rgba(255, 255, 255, 0.25); /* Dashed outline */
            left: 50%;
            top: 50%;
            transform-origin: center center;
            pointer-events: none;
            z-index: 9999; /* Above all content */
        }
        .clip-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            display: none;
        }
    </style>
</head>
<body>

    <div id="container">
        <!-- Active frame background (black) and outline (dashed) -->
        <div id="frame-background"></div>
        <div id="frame-outline"></div>
    </div>

    <script>
        if (typeof WebmMuxer === 'undefined' && typeof WebMMuxer !== 'undefined') {
            window.WebmMuxer = WebMMuxer;
        }
        // Parse project config from URL query parameter (Base64 or project_name)
        const params = new URLSearchParams(window.location.search);
        const projectBase64 = params.get('project');
        const projectName = params.get('project_name');
        const globalWidth = parseInt(params.get('width')) || 1920;
        const globalHeight = parseInt(params.get('height')) || 1080;
        
        // Subproject nested transition parameters
        const subprojDefaultTransition = params.get('subproj_default_transition');
        const subprojTransitionDuration = parseFloat(params.get('subproj_transition_duration')) || 0.5;
        const subprojTransitionOverride = params.get('subproj_transition_override') || 'empty';
        
        let project = { tracks: [] };
        window.project = project;

        // Initialize subproject rendering canvas
        let subprojectCanvas = null;
        let subprojectCtx = null;

        function getSubprojectCanvas() {
            if (!subprojectCanvas) {
                subprojectCanvas = document.createElement('canvas');
                subprojectCanvas.width = globalWidth;
                subprojectCanvas.height = globalHeight;
                subprojectCtx = subprojectCanvas.getContext('2d');
                window.subprojectCanvas = subprojectCanvas;
                window.subprojectCtx = subprojectCtx;
            }
            return subprojectCanvas;
        }
        window.getSubprojectCanvas = getSubprojectCanvas;



        const container = document.getElementById('container');
        const trackElements = [];
        window.trackElements = trackElements;
        let isCurrentlyPlaying = false;
        let currentPlayheadTime = 0.0;


        function getEnvelopeVolume(points, t, duration) {
            if (!points || points.length === 0) return 1.0;
            const sorted = [...points].sort((a, b) => a.t - b.t);
            if (t <= sorted[0].t) return sorted[0].v;
            if (t >= sorted[sorted.length - 1].t) return sorted[sorted.length - 1].v;
            
            let idx = 0;
            for (let i = 0; i < sorted.length - 1; i++) {
                if (t >= sorted[i].t && t <= sorted[i + 1].t) {
                    idx = i;
                    break;
                }
            }
            const p1 = sorted[idx];
            const p2 = sorted[idx + 1];
            const dt = p2.t - p1.t;
            if (dt === 0) return p1.v;
            const u = (t - p1.t) / dt;
            
            const v = p1.v + u * (p2.v - p1.v);
            return Math.max(0.0, Math.min(1.0, v));
        }

        function adjustScaling() {
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            if (containerWidth === 0 || containerHeight === 0) return;

            const scale = Math.min(containerWidth / globalWidth, containerHeight / globalHeight);

            // Size and scale the outline and background frame elements
            const frameBg = document.getElementById('frame-background');
            const frameOutline = document.getElementById('frame-outline');
            if (frameBg) {
                frameBg.style.width = `${globalWidth}px`;
                frameBg.style.height = `${globalHeight}px`;
                frameBg.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
            if (frameOutline) {
                frameOutline.style.width = `${globalWidth}px`;
                frameOutline.style.height = `${globalHeight}px`;
                frameOutline.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }

            trackElements.forEach(el => {
                applyElementTransform(el);
            });
        }

        function applyElementTransform(el) {
            const type = el.dataset.type;
            if (type !== 'html' && type !== 'video' && type !== 'image') return;

            const pX = parseFloat(el.dataset.panX) || 0;
            const pY = parseFloat(el.dataset.panY) || 0;
            const clipScaleX = parseFloat(el.dataset.scaleX) || 1.0;
            const clipScaleY = parseFloat(el.dataset.scaleY) || 1.0;
            const rotateDeg = parseFloat(el.dataset.rotation) || 0;
            const isMirrored = el.dataset.mirror === "true";

            const transProgress = el.dataset.transProgress !== undefined ? parseFloat(el.dataset.transProgress) : 1.0;
            const activeTransType = el.dataset.activeTransType || 'none';
            const transDirection = el.dataset.transDirection || 'in';

            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            if (containerWidth === 0 || containerHeight === 0) return;

            const scale = Math.min(containerWidth / globalWidth, containerHeight / globalHeight);

            let baseWidth = globalWidth;
            let baseHeight = globalHeight;

            if (type === 'html') {
                baseWidth = 1920;
                baseHeight = 1080;
                try {
                    const win = el.contentWindow;
                    const doc = el.contentDocument || win.document;
                    if (doc) {
                        const compEl = doc.querySelector('[data-width][data-height]');
                        if (compEl) {
                            baseWidth = parseInt(compEl.dataset.width) || 1920;
                            baseHeight = parseInt(compEl.dataset.height) || 1080;
                        }
                    }
                } catch (e) {}
            }

            // effectiveScale is the ratio of the design space to the container.
            // For HTML tracks, the design space is always the virtual 1920x1080 canvas.
            // For video/image, the design space is the actual render resolution.
            const effectiveScale = Math.min(containerWidth / baseWidth, containerHeight / baseHeight);

            let elScaleX = effectiveScale * clipScaleX;
            let elScaleY = effectiveScale * clipScaleY;
            if (type === 'html') {
                el.style.width = `${baseWidth}px`;
                el.style.height = `${baseHeight}px`;
            } else {
                el.style.width = `${globalWidth}px`;
                el.style.height = `${globalHeight}px`;
            }

            // Calculate transition offset/zoom/rotate modifiers.
            // Offsets are in "design space" units (baseWidth/baseHeight),
            // and will be converted to screen pixels by effectiveScale below.
            let transX = 0;
            let transY = 0;
            let transScale = 1.0;
            let transRot = 0;

            if (activeTransType === 'slide-left') {
                if (transDirection === 'in') {
                    transX = (1 - transProgress) * baseWidth;
                } else {
                    transX = (1 - transProgress) * -baseWidth;
                }
            } else if (activeTransType === 'slide-right') {
                if (transDirection === 'in') {
                    transX = (1 - transProgress) * -baseWidth;
                } else {
                    transX = (1 - transProgress) * baseWidth;
                }
            } else if (activeTransType === 'slide-up') {
                if (transDirection === 'in') {
                    transY = (1 - transProgress) * baseHeight;
                } else {
                    transY = (1 - transProgress) * -baseHeight;
                }
            } else if (activeTransType === 'slide-down') {
                if (transDirection === 'in') {
                    transY = (1 - transProgress) * -baseHeight;
                } else {
                    transY = (1 - transProgress) * baseHeight;
                }
            } else if (activeTransType === 'zoom') {
                transScale = transProgress;
            } else if (activeTransType === 'rotate') {
                if (transDirection === 'in') {
                    transRot = (1 - transProgress) * -180;
                } else {
                    transRot = (1 - transProgress) * 180;
                }
                transScale = transProgress;
            }

            let animDx = 0;
            let animDy = 0;
            let animRot = 0;
            let animScale = 1.0;
            
            const animToolStr = el.dataset.animateTool;
            if (animToolStr) {
                try {
                    let animations = JSON.parse(animToolStr);
                    if (animations) {
                        if (!Array.isArray(animations)) {
                            animations = [animations];
                        }
                        
                        const start = parseFloat(el.dataset.start);
                        const duration = parseFloat(el.dataset.duration);
                        const localTime = currentPlayheadTime - start;

                        let x_curr = 0;
                        let y_curr = 0;
                        let rot_curr = 0;
                        let scale_curr = 1.0;

                        // Helper easing function inside render-host
                        const getEasingVal = (easing, t) => {
                            t = Math.max(0, Math.min(1, t));
                            if (easing === 'sine_in') {
                                return 1 - Math.cos((t * Math.PI) / 2);
                            } else if (easing === 'sine_out') {
                                return Math.sin((t * Math.PI) / 2);
                            } else if (easing === 'sine_in_out') {
                                return -(Math.cos(Math.PI * t) - 1) / 2;
                            } else if (easing === 'elastic') {
                                const c4 = (2 * Math.PI) / 3;
                                return t === 0 ? 0 : t === 1 ? 1 : -Math.pow(2, 10 * t - 10) * Math.sin((t * 10 - 10.75) * c4);
                            } else if (easing === 'bounce') {
                                const n1 = 7.5625;
                                const d1 = 2.75;
                                if (t < 1 / d1) {
                                    return n1 * t * t;
                                } else if (t < 2 / d1) {
                                    return n1 * (t -= 1.5 / d1) * t + 0.75;
                                } else if (t < 2.5 / d1) {
                                    return n1 * (t -= 2.25 / d1) * t + 0.9375;
                                } else {
                                    return n1 * (t -= 2.625 / d1) * t + 0.984375;
                                }
                            }
                            return t; // linear
                        };

                        for (let i = 0; i < animations.length; i++) {
                            const animTool = animations[i];
                            const startTime = animTool.start_time !== undefined ? parseFloat(animTool.start_time) : 0.0;
                            const endTime = animTool.end_time !== undefined ? parseFloat(animTool.end_time) : duration;
                            
                            if (localTime >= startTime && localTime <= endTime) {
                                const T = localTime - startTime;
                                const durationAnim = endTime - startTime;
                                const t = durationAnim > 0 ? Math.max(0, Math.min(1, T / durationAnim)) : 1.0;
                                const easingType = animTool.easing || 'linear';

                                const freq = animTool.periodicity !== undefined ? parseFloat(animTool.periodicity) : 1.0;
                                const amp = animTool.amplitude !== undefined ? parseFloat(animTool.amplitude) : 0.0;
                                
                                // Calculate global eased time progression
                                const t_eased = getEasingVal(easingType, t);
                                const theta = 2 * Math.PI * freq * t_eased;

                                if (animTool.type === 'rotate') {
                                    const itemRot = Math.sin(theta) * amp;
                                    rot_curr += itemRot;

                                    if (animTool.pivot) {
                                        const pX_pct = parseFloat(animTool.pivot[0]);
                                        const pY_pct = parseFloat(animTool.pivot[1]);
                                        const x_origin = (pX_pct / 100 - 0.5) * baseWidth * (isMirrored ? -1 : 1);
                                        const y_origin = (pY_pct / 100 - 0.5) * baseHeight;
                                        
                                        const radRot = itemRot * Math.PI / 180;
                                        const cosR = Math.cos(radRot);
                                        const sinR = Math.sin(radRot);
                                        
                                        x_curr += x_origin - (x_origin * cosR - y_origin * sinR);
                                        y_curr += y_origin - (x_origin * sinR + y_origin * cosR);
                                    }
                                } else if (animTool.type === 'scale') {
                                    const itemScale = 1.0 + Math.sin(theta) * amp;
                                    scale_curr *= itemScale;
                                } else if (animTool.type === 'translate') {
                                    const dirDeg = animTool.direction_angle !== undefined ? parseFloat(animTool.direction_angle) : 90.0;
                                    const rad = (dirDeg * Math.PI) / 180;
                                    
                                    // Linear translate repeats freq times as a sawtooth wave
                                    let t_cycle = (t_eased * freq) % 1;
                                    if (t_cycle === 0 && t_eased > 0) {
                                        t_cycle = 1.0;
                                    }
                                    const offset = t_cycle * amp;
                                    
                                    x_curr += offset * Math.cos(rad);
                                    y_curr += offset * Math.sin(rad);
                                } else if (animTool.type === 'translate_sinusoidal') {
                                    const dirDeg = animTool.direction_angle !== undefined ? parseFloat(animTool.direction_angle) : 90.0;
                                    const rad = (dirDeg * Math.PI) / 180;
                                    const offset = Math.sin(theta) * amp;
                                    x_curr += offset * Math.cos(rad);
                                    y_curr += offset * Math.sin(rad);
                                } else if (animTool.type === 'shake') {
                                    const offset_x = Math.sin(theta) * Math.cos(theta * 1.5) * amp;
                                    const offset_y = Math.cos(theta) * Math.sin(theta * 1.2) * amp;
                                    x_curr += offset_x;
                                    y_curr += offset_y;
                                }
                            }
                        }

                        const dx_scaled = x_curr * clipScaleX;
                        const dy_scaled = y_curr * clipScaleY;
                        
                        const baseRad = rotateDeg * Math.PI / 180;
                        const cosB = Math.cos(baseRad);
                        const sinB = Math.sin(baseRad);
                        
                        animDx = dx_scaled * cosB - dy_scaled * sinB;
                        animDy = dx_scaled * sinB + dy_scaled * cosB;
                        animRot = rot_curr;
                        animScale = scale_curr;
                    }
                } catch(e) {
                    console.warn("Error parsing animate_tool metadata:", e);
                }
            }

            el.dataset.animDx = animDx;
            el.dataset.animDy = animDy;
            el.dataset.animRot = animRot;
            el.dataset.animScale = animScale;

            el.style.transformOrigin = '50% 50%';

            // panX/panY are in design-space pixels, converted to screen pixels by effectiveScale.
            const finalPanX = (pX + animDx) * effectiveScale + transX * effectiveScale;
            const finalPanY = (pY + animDy) * effectiveScale + transY * effectiveScale;
            const finalScaleX = elScaleX * transScale * animScale * (isMirrored ? -1 : 1);
            const finalScaleY = elScaleY * transScale * animScale;
            const finalRot = rotateDeg + animRot + transRot;

            el.style.transform = `translate(calc(-50% + ${finalPanX}px), calc(-50% + ${finalPanY}px)) scale(${finalScaleX}, ${finalScaleY}) rotate(${finalRot}deg)`;
        }

        window.addEventListener('resize', adjustScaling);

        function createTrackElements() {
            // Dynamically create asset tracks based on extension type
            project.tracks.forEach(track => {
                const src = track.src.toLowerCase();
                let el;
                let type = 'html';

                if (src.endsWith('.png') || src.endsWith('.jpg') || src.endsWith('.jpeg') || src.endsWith('.gif')) {
                    type = 'image';
                    el = document.createElement('img');
                } else if (src.endsWith('.mp4') || src.endsWith('.webm')) {
                    type = 'video';
                    el = document.createElement('video');
                    el.muted = true;
                    el.playsInline = true;
                    el.preload = 'auto';
                    el.load(); // Force immediate background preloading & decoding
                } else if (src.endsWith('.mp3') || src.endsWith('.wav') || src.endsWith('.ogg')) {
                    type = 'audio';
                    el = document.createElement('audio');
                    el.crossOrigin = "anonymous";
                    el.preload = 'auto';
                    el.load(); // Force immediate background preloading & decoding
                } else {
                    type = 'html';
                    el = document.createElement('iframe');
                    el.setAttribute('allow', 'autoplay');
                }

                el.className = 'clip-element';
                el.dataset.type = type;
                el.dataset.trackIndex = track.trackIndex;
                el.dataset.id = track.id || `clip_${track.trackIndex}_${track.start.toFixed(2)}`;
                el.dataset.start = track.start;
                el.dataset.duration = track.duration;
                el.dataset.sourceStart = track.sourceStart !== undefined ? track.sourceStart : 0.0;
                el.dataset.fadeIn = track.fadeIn || 0;
                el.dataset.fadeOut = track.fadeOut || 0;
                el.dataset.transitionIn = track.transitionIn || (track.fadeIn > 0 ? 'fade' : 'none');
                el.dataset.transitionOut = track.transitionOut || (track.fadeOut > 0 ? 'fade' : 'none');
                el.dataset.compressTop = track.compressTop !== undefined ? track.compressTop : 1.0;
                el.dataset.compressBottom = track.compressBottom !== undefined ? track.compressBottom : 0.0;
                el.dataset.panX = track.panX !== undefined ? track.panX : 0;
                el.dataset.panY = track.panY !== undefined ? track.panY : 0;
                el.dataset.scale = track.scale !== undefined ? track.scale : 1.0;
                el.dataset.scaleX = track.scaleX !== undefined ? track.scaleX : (track.scale !== undefined ? track.scale : 1.0);
                el.dataset.scaleY = track.scaleY !== undefined ? track.scaleY : (track.scale !== undefined ? track.scale : 1.0);
                el.dataset.rotation = track.rotation !== undefined ? track.rotation : 0;
                el.dataset.opacity = track.opacity !== undefined ? track.opacity : 1.0;
                el.dataset.mirror = track.mirror ? "true" : "false";
                if (track.animate_tool) {
                    el.dataset.animateTool = JSON.stringify(track.animate_tool);
                }
                if (track.volumePoints) {
                    el.dataset.volumePoints = typeof track.volumePoints === 'string' ? track.volumePoints : JSON.stringify(track.volumePoints);
                }
                
                el.style.position = 'absolute';
                el.style.zIndex = 100 - parseInt(track.trackIndex || 0);
                el.style.border = 'none';
                el.style.background = 'transparent';
                el.style.display = 'none';

                if (type === 'html' || type === 'video' || type === 'image') {
                    el.style.left = '50%';
                    el.style.top = '50%';
                    el.style.transformOrigin = 'center center';
                } else {
                    el.style.top = '0';
                    el.style.left = '0';
                    el.style.width = '100%';
                    el.style.height = '100%';
                }

                if (type === 'html') {
                    el.addEventListener('load', () => {
                        el.dataset.loaded = "true";
                        try {
                            const win = el.contentWindow;
                            if (win) {
                                setupRAFInterception(win);
                            }
                            const doc = el.contentDocument || win.document;
                            if (doc) {
                                try {
                                    win.addEventListener('keydown', (e) => {
                                        if (e.code === 'Space') {
                                            const active = doc.activeElement;
                                            if (active && (
                                                active.tagName === 'TEXTAREA' || 
                                                active.tagName === 'SELECT' || 
                                                (active.tagName === 'INPUT' && (active.type === 'text' || active.type === 'number' || active.type === 'password' || active.type === 'email'))
                                            )) {
                                                return;
                                            }
                                            e.preventDefault();
                                            let p = win.parent;
                                            while (p) {
                                                if (typeof p.togglePlay === 'function') {
                                                    p.togglePlay();
                                                    break;
                                                }
                                                if (p === p.parent) break;
                                                p = p.parent;
                                            }
                                        }
                                    });
                                } catch (err) {}

                                // Check if the document contains a template at the root
                                const template = doc.querySelector('template');
                                if (template) {
                                    console.log("Detected HyperFrames template. Activating template content...");
                                    el.dataset.isScriptReady = "false";
                                    const content = template.content;
                                    doc.body.innerHTML = '';
                                    
                                    const fragment = content.cloneNode(true);
                                    const scripts = Array.from(fragment.querySelectorAll('script'));
                                    scripts.forEach(s => {
                                        if (s.parentNode) s.parentNode.removeChild(s);
                                    });
                                    doc.body.appendChild(fragment);

                                    // Configure styling for template layouts
                                    doc.body.style.width = '100%';
                                    doc.body.style.height = '100%';
                                    doc.body.style.overflow = 'hidden';
                                    doc.body.style.margin = '0';
                                    doc.body.style.position = 'relative';

                                    // Find and run scripts sequentially to avoid race conditions (e.g. GSAP undefined)
                                    async function loadScriptsSequentially(idx) {
                                        if (idx >= scripts.length) {
                                            // Auto-bypass gates once script loading is complete
                                            const gate = doc.getElementById('gate-overlay') || doc.getElementById('audio-gate');
                                            if (gate) gate.click();
                                            adjustScaling();
                                            el.dataset.isScriptReady = "true";
                                            return;
                                        }
                                        const oldS = scripts[idx];
                                        const newS = doc.createElement('script');
                                        if (oldS.parentNode) oldS.parentNode.removeChild(oldS);
                                        
                                        if (oldS.src) {
                                            newS.src = oldS.src;
                                            newS.onload = () => loadScriptsSequentially(idx + 1);
                                            newS.onerror = () => loadScriptsSequentially(idx + 1);
                                            doc.body.appendChild(newS);
                                        } else {
                                            newS.text = oldS.textContent;
                                            doc.body.appendChild(newS);
                                            await loadScriptsSequentially(idx + 1);
                                        }
                                    }
                                    loadScriptsSequentially(0);
                                } else {
                                    const gate = doc.getElementById('gate-overlay') || doc.getElementById('audio-gate');
                                    if (gate) {
                                        gate.click();
                                    }
                                    el.dataset.isScriptReady = "true";
                                }
                            }
                            
                            adjustScaling();

                            // Seek loaded html iframe to its relative playhead position on load
                            const start = parseFloat(el.dataset.start);
                            const duration = parseFloat(el.dataset.duration);
                            const sourceStart = parseFloat(el.dataset.sourceStart || 0);
                            const localTime = currentPlayheadTime - start;
                            const playbackTime = localTime + sourceStart;
                            if (localTime >= 0 && localTime <= duration) {
                                if (typeof win.seekTo === 'function') {
                                    win.seekTo(playbackTime, true);
                                }
                            }

                            if (isCurrentlyPlaying && el.style.display === 'block') {
                                if (typeof win.playSceneAudio === 'function') win.playSceneAudio();
                                if (win.audioCtx && win.audioCtx !== audioCtx && typeof win.audioCtx.resume === 'function') {
                                    win.audioCtx.resume();
                                }
                            } else {
                                if (typeof win.pauseSceneAudio === 'function') win.pauseSceneAudio();
                                if (win.audioCtx && win.audioCtx !== audioCtx && typeof win.audioCtx.suspend === 'function') {
                                    win.audioCtx.suspend();
                                }
                            }
                        } catch (e) {
                            console.warn("Could not auto-bypass audio-gate on load:", e);
                        }
                    });
                    el.addEventListener('error', () => {
                        el.dataset.loaded = "true";
                    });
                }

                container.appendChild(el);
                trackElements.push(el);

                if (type === 'video' || type === 'audio') {
                    try {
                        if (typeof getAudioNodes === 'function') {
                            getAudioNodes(el);
                        }
                    } catch (e) {
                        console.warn("Failed to pre-warm audio nodes for clip:", e);
                    }
                }

                if (type === 'html') {
                    if (track.src.startsWith('/render-host.html') || track.src.startsWith('project:')) {
                        el.src = track.src;
                    } else {
                        // Fetch and inject RAF override immediately to support background rendering before script execution
                        (async () => {
                            try {
                                let fetchFn = window.fetch;
                                try {
                                    if (window.top && typeof window.top.fetch === 'function') {
                                        fetchFn = window.top.fetch;
                                    }
                                } catch(originErr) {}
                                const response = await fetchFn(track.src);
                                if (response.ok) {
                                    let html = await response.text();
                                    const baseDir = track.src.substring(0, track.src.lastIndexOf('/') + 1);
                                    const injection = `
<base href="${baseDir}">
<script>
    (function() {
        const isParentAccessible = () => {
            try { return !!(window.parent && window.parent.location && window.parent.location.href); }
            catch(e) { return false; }
        };
        const originalRAF = window.requestAnimationFrame;
        window.requestAnimationFrame = function(cb) {
            if (isParentAccessible() && window.parent && typeof window.parent.isRenderingActive === 'function' && window.parent.isRenderingActive()) {
                window._capturedRAFCallback = cb;
                return 0;
            } else {
                return originalRAF(cb);
            }
        };
        window.requestAnimationFrame.triggerDraw = function(timestamp) {
            if (window._capturedRAFCallback) {
                const cb = window._capturedRAFCallback;
                window._capturedRAFCallback = null;

        // Global offline audio rendering API

                const offlineMasterLimiter = offlineCtx.createGain();
                
                const cTop = project.masterCompressTop !== undefined ? project.masterCompressTop : 1.0;
                const cBot = project.masterCompressBottom !== undefined ? project.masterCompressBottom : 0.0;
                
                const compAmount = Math.max(0, Math.min(0.9, (1.0 - cTop) + cBot));
                const thresholdVal = -50 * compAmount;
                const ratioVal = 1 + 19 * compAmount;

                        for (let i = 0; i < len; i++) {
                            const xL = inL[i];
                            const xR = inR[i];
                            
                            // 1. Read delayed sample first
                            const delayedL = delayBufL[writeIdx];
                            const delayedR = delayBufR[writeIdx];
                            
                            // 2. Overwrite with new incoming sample

                            delayBufR[writeIdx] = xR;

        function analyzeAudioBuffer(buffer) {
            if (!buffer) return null;
            const channelL = buffer.getChannelData(0);
            const channelR = buffer.numberOfChannels > 1 ? buffer.getChannelData(1) : channelL;
            const len = buffer.length;
            const sampleRate = buffer.sampleRate;

            let maxPeak = 0;
            let sumSqAll = 0;

            const windowSamples = Math.max(1, Math.floor(sampleRate * 0.1)); // 100ms windows
            const blockRmsList = [];

            for (let i = 0; i < len; i += windowSamples) {
                let blockSumSq = 0;
                const blockEnd = Math.min(len, i + windowSamples);
                const count = blockEnd - i;

                for (let j = i; j < blockEnd; j++) {
                    const absL = Math.abs(channelL[j]);
                    const absR = Math.abs(channelR[j]);
                    if (absL > maxPeak) maxPeak = absL;
                    if (absR > maxPeak) maxPeak = absR;

                    const sampleRms = (absL * absL + absR * absR) / 2;
                    blockSumSq += sampleRms;
                    sumSqAll += sampleRms;
                }

                const blockRms = Math.sqrt(blockSumSq / (count || 1));
                if (blockRms > 0.00001) {
                    blockRmsList.push(blockRms);
                }
            }

            const maxPeakDb = maxPeak > 0.00001 ? 20 * Math.log10(maxPeak) : -100;
            const overallRms = Math.sqrt(sumSqAll / (len || 1));
            const integratedLufs = overallRms > 0.00001 ? 20 * Math.log10(overallRms) - 0.6 : -100;

            blockRmsList.sort((a, b) => a - b);
            const numBlocks = blockRmsList.length;

            let quietLufs = integratedLufs;
            let midLufs = integratedLufs;
            let loudLufs = integratedLufs;
            let lra = 0;

            if (numBlocks > 0) {
                const qStart = Math.floor(numBlocks * 0.05);
                const qEnd = Math.max(qStart + 1, Math.floor(numBlocks * 0.20));
                let qSumSq = 0;
                for (let k = qStart; k < qEnd; k++) qSumSq += blockRmsList[k] * blockRmsList[k];
                const qRms = Math.sqrt(qSumSq / (qEnd - qStart));
                quietLufs = qRms > 0.00001 ? 20 * Math.log10(qRms) - 0.6 : -100;

                const lStart = Math.floor(numBlocks * 0.85);
                const lEnd = Math.max(lStart + 1, Math.floor(numBlocks * 0.98));
                let lSumSq = 0;
                for (let k = lStart; k < lEnd; k++) lSumSq += blockRmsList[k] * blockRmsList[k];
                const lRms = Math.sqrt(lSumSq / (lEnd - lStart));
                loudLufs = lRms > 0.00001 ? 20 * Math.log10(lRms) - 0.6 : -100;

                const mStart = Math.floor(numBlocks * 0.20);
                const mEnd = Math.max(mStart + 1, Math.floor(numBlocks * 0.80));
                let mSumSq = 0;
                for (let k = mStart; k < mEnd; k++) mSumSq += blockRmsList[k] * blockRmsList[k];
                const mRms = Math.sqrt(mSumSq / (mEnd - mStart));
                midLufs = mRms > 0.00001 ? 20 * Math.log10(mRms) - 0.6 : -100;

                lra = Math.max(0, loudLufs - quietLufs);
            }

            return {
                peakDb: parseFloat(maxPeakDb.toFixed(1)),
                integratedLufs: parseFloat(integratedLufs.toFixed(1)),
                quietLufs: parseFloat(quietLufs.toFixed(1)),
                midLufs: parseFloat(midLufs.toFixed(1)),
                loudLufs: parseFloat(loudLufs.toFixed(1)),
                lra: parseFloat(lra.toFixed(1)),

                        transY = (1 - transProgress) * -globalHeight;
                    } else {
                        transY = (1 - transProgress) * globalHeight;
                    }
                } else if (activeTransType === 'zoom') {
                    transScale = transProgress;
                } else if (activeTransType === 'rotate') {
                    if (transDirection === 'in') {
                        transRot = (1 - transProgress) * -180;
                    } else {
                        transRot = (1 - transProgress) * 180;
                    }
                    transScale = transProgress;
                }

                ctx.save();
                ctx.globalAlpha = opacity;

                const animDx = parseFloat(el.dataset.animDx) || 0;
                const animDy = parseFloat(el.dataset.animDy) || 0;
                const animRot = parseFloat(el.dataset.animRot) || 0;
                const animScale = el.dataset.animScale !== undefined ? parseFloat(el.dataset.animScale) : 1.0;

                const finalPanX = pX + transX + animDx;
                const finalPanY = pY + transY + animDy;
                const finalRot = rotateDeg + transRot + animRot;
                const finalScaleX = clipScaleX * transScale * animScale;
                const finalScaleY = clipScaleY * transScale * animScale;

                ctx.translate(globalWidth / 2 + finalPanX, globalHeight / 2 + finalPanY);
                ctx.rotate(finalRot * Math.PI / 180);

                let drawW = globalWidth;
                let drawH = globalHeight;

                if (type === 'html') {
                    let baseWidth = 1920;
                    let baseHeight = 1080;
                    try {
                        const win = el.contentWindow;
                        const doc = el.contentDocument || win.document;
                        if (doc) {
                            const compEl = doc.querySelector('[data-width][data-height]');
                            if (compEl) {
                                baseWidth = parseInt(compEl.dataset.width) || 1920;
                                baseHeight = parseInt(compEl.dataset.height) || 1080;
                            }
                        }
                    } catch (e) {}

                    const htmlScale = Math.min(globalWidth / baseWidth, globalHeight / baseHeight);
                    ctx.scale(htmlScale * finalScaleX, htmlScale * finalScaleY);
                    drawW = baseWidth;
                    drawH = baseHeight;
                } else {
                    ctx.scale(finalScaleX, finalScaleY);
                }

                if (type === 'image') {
                    ctx.drawImage(el, -drawW / 2, -drawH / 2, drawW, drawH);
                } else if (type === 'video') {
                    ctx.drawImage(el, -drawW / 2, -drawH / 2, drawW, drawH);
                } else if (type === 'html') {
                    try {
                        const win = el.contentWindow;
                        if (win) {
                            if (typeof win.compositeFrame === 'function') {
                                const subCanvas = win.getSubprojectCanvas();
                                const subCtx = win.subprojectCtx;
                                win.compositeFrame(subCtx);
                            }
                            if (win.subprojectCanvas) {
                                ctx.drawImage(win.subprojectCanvas, -drawW / 2, -drawH / 2, drawW, drawH);
                            } else {
                                const doc = el.contentDocument || win.document;
                                if (doc) {
                                    const iframeCanvas = doc.querySelector('canvas');
                                    if (iframeCanvas) {
                                        ctx.drawImage(iframeCanvas, -drawW / 2, -drawH / 2, drawW, drawH);
                                    }
                                }
                            }
                        }
                    } catch (e) {
                        console.warn("Failed to composite HTML track frame:", e);
                    }
                }
                ctx.restore();
            });

            // If running as a subproject iframe, also mirror composition to subprojectCanvas
            if (window !== window.top) {
                const subCanvas = getSubprojectCanvas();
                if (ctx !== subprojectCtx) {
                    subprojectCtx.clearRect(0, 0, globalWidth, globalHeight);
                    subprojectCtx.drawImage(ctx.canvas, 0, 0);
                }
            }
        }
        window.compositeFrame = compositeFrame;

        async function runWebCodecsRender(settings) {
            const width = globalWidth;
            const height = globalHeight;
            const fps = settings.fps || 30;
            const duration = settings.duration || 10;
            const totalFrames = Math.ceil(duration * fps);
            const bitrate = (width >= 3840) ? 40e6 : (width >= 1920) ? 8e6 : 4e6;
            const jobId = Date.now();

            const masterCanvas = document.createElement('canvas');
            masterCanvas.width = width;
            masterCanvas.height = height;
            const masterCtx = masterCanvas.getContext('2d');

            if (typeof WebmMuxer === 'undefined') {
                throw new Error("WebmMuxer CDN library did not load successfully. Ensure you have an internet connection.");
            }

            let videoCodec = 'V_VP9';
            let encoderCodec = 'vp09.00.10.08';
            let hardwareAccel = 'no-preference';

            try {
                const codecConfigs = [
                    { name: 'H264_High', codec: 'avc1.64002a', muxerCodec: 'V_MPEG4/ISO/AVC', hw: 'prefer-hardware' },
                    { name: 'H264_Main', codec: 'avc1.4d002a', muxerCodec: 'V_MPEG4/ISO/AVC', hw: 'prefer-hardware' },
                    { name: 'VP9_HW', codec: 'vp09.00.10.08', muxerCodec: 'V_VP9', hw: 'prefer-hardware' },
                    { name: 'VP9_SW', codec: 'vp09.00.10.08', muxerCodec: 'V_VP9', hw: 'no-preference' },
                    { name: 'VP8_SW', codec: 'vp8', muxerCodec: 'V_VP8', hw: 'no-preference' }
                ];

                for (const config of codecConfigs) {
                    try {
                        const support = await VideoEncoder.isConfigSupported({
                            codec: config.codec,
                            width: width,
                            height: height,
                            bitrate: bitrate,
                            framerate: fps,
                            hardwareAcceleration: config.hw
                        });
                        if (support.supported) {
                            encoderCodec = config.codec;
                            videoCodec = config.muxerCodec;
                            hardwareAccel = config.hw;
                            console.log(`[Encoder] Selected configuration: ${config.name} (${config.codec}), hw: ${config.hw}`);
                            break;
                        }
                    } catch (e) {
                        console.warn(`Codec support check failed for ${config.name}:`, e);
                    }
                }
            } catch (err) {
                console.warn("Codec support scan failed. Falling back to VP9 default:", err);
            }

            // --- Streaming chunk upload setup ---
            // Instead of accumulating the full WebM in RAM (ArrayBufferTarget),
            // we use StreamTarget and periodically flush chunks to the server via
            // /api/upload-client-render-chunk-append (disk-append mode).
            // This keeps browser RAM usage constant regardless of video length.
            const videoChunks = [];
            const FLUSH_CHUNK_COUNT = 30; // flush every ~30 muxer output chunks
            let pendingFlushPromise = null;

            async function flushVideoChunks() {
                if (videoChunks.length === 0) return;
                const toUpload = videoChunks.splice(0, videoChunks.length);
                const combined = new Uint8Array(toUpload.reduce((acc, c) => acc + c.byteLength, 0));
                let offset = 0;
                for (const c of toUpload) {
                    combined.set(c, offset);
                    offset += c.byteLength;
                }
                const resp = await fetch(`/api/upload-client-render-chunk-append?job_id=${jobId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/octet-stream' },
                    body: combined
                });
                if (!resp.ok) throw new Error('Chunk append upload failed: ' + await resp.text());
            }

            let muxer = new WebmMuxer.Muxer({
                target: new WebmMuxer.StreamTarget(
                    (data, position) => {
                        videoChunks.push(new Uint8Array(data));
                        if (videoChunks.length >= FLUSH_CHUNK_COUNT) {
                            if (!pendingFlushPromise) {
                                pendingFlushPromise = flushVideoChunks().finally(() => { pendingFlushPromise = null; });
                            }
                        }
                    }
                ),
                video: {
                    codec: videoCodec,
                    width: width,
                    height: height
                },
                streaming: true,          // CRITICAL: forces monotonic sequential writes — required for append-to-file mode
                firstTimestampBehavior: 'offset'
            });

            let encoderError = null;
            let encoder = new VideoEncoder({
                output: (chunk, metadata) => {
                    muxer.addVideoChunk(chunk, metadata);
                },
                error: (e) => {
                    console.error("WebCodecs encoding error:", e);
                    encoderError = e;
                }
            });

            await encoder.configure({
                codec: encoderCodec,
                width: width,
                height: height,
                bitrate: bitrate,
                framerate: fps,
                hardwareAcceleration: hardwareAccel
            });

            for (let frameIndex = 0; frameIndex < totalFrames; frameIndex++) {
                if (shouldAbortBrowserRender) {
                    throw new Error("Render process aborted by user.");
                }
                if (encoderError) {
                    throw new Error("Encoder encountered a fatal error: " + (encoderError.message || encoderError));
                }

                // Monitor encoding queue backpressure to prevent GPU encoder lockup
                while (encoder.encodeQueueSize > 15) {
                    await workerTimer.delay(2);
                }

                const time = frameIndex / fps;
                const anyShown = seekTo(time);

                if (anyShown) {
                    // Yield control to let newly visible iframe scripts run and initialize
                    await workerTimer.delay(10);
                }

                // Wait until all assets for the frame are loaded and ready
                await new Promise((resolve) => {
                    let checkCount = 0;
                    async function check() {
                        if (window.isReady() || checkCount > 20) {
                            resolve();
                        } else {
                            checkCount++;
                            await workerTimer.delay(10);
                            check();
                        }
                    }
                    check();
                });

                // Yield to the layout engine to ensure that iframe/GSAP repaints have completed
                let needsLayoutYield = false;
                for (let el of trackElements) {
                    if (el.dataset.type === 'html' && el.style.display !== 'none') {
                        if (hasPendingRAF(el.contentWindow)) {
                            needsLayoutYield = true;
                            break;
                        }
                    }
                }
                if (needsLayoutYield) {
                    await workerTimer.delay(2);
                }

                compositeFrame(masterCtx);

                const videoFrame = new VideoFrame(masterCanvas, {
                    timestamp: (frameIndex * 1e6) / fps // microseconds
                });

                encoder.encode(videoFrame, { keyFrame: frameIndex % 30 === 0 });
                videoFrame.close();

                window.parent.postMessage({
                    type: 'render-progress',
                    progress: Math.round((frameIndex / totalFrames) * 100),
                    frame: frameIndex,
                    total: totalFrames
                }, '*');
            }

            await encoder.flush();
            muxer.finalize();

            // Wait for any in-flight flush, then drain remaining chunks
            if (pendingFlushPromise) await pendingFlushPromise;
            await flushVideoChunks();

            window.parent.postMessage({
                type: 'render-progress',
                progress: 95,
                frame: totalFrames,
                total: totalFrames
            }, '*');

            let wavBuffer = null;
            try {
                wavBuffer = await window.renderAudioOffline(duration, null, null, null, true);
            } catch (audioErr) {
                console.error("Failed to render offline audio in browser:", audioErr);
            }

            window.parent.postMessage({
                type: 'render-progress',
                progress: 98,
                frame: totalFrames,
                total: totalFrames
            }, '*');

            try {
                // Upload audio (video is already on disk via chunk-append)
                if (wavBuffer) {
                    const audioResponse = await fetch(`/api/upload-client-render-chunk?job_id=${jobId}&type=audio`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/octet-stream' },
                        body: wavBuffer
                    });
                    if (!audioResponse.ok) {
                        throw new Error(await audioResponse.text() || 'Failed to upload audio chunk.');
                    }
                }

                // Mux video + audio on server
                const response = await fetch('/api/mux-client-render', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_id: jobId,
                        hasAudio: !!wavBuffer
                    })
                });

                if (!response.ok) {
                    const errTxt = await response.text();
                    throw new Error(errTxt || 'Server muxing failed.');
                }

                const result = await response.json();
                window.parent.postMessage({
                    type: 'render-success',
                    url: result.path,
                    isServerMuxed: true,
                    audioStats: (wavBuffer && wavBuffer.audioStats) ? wavBuffer.audioStats : window.lastRenderAudioStats
                }, '*');
            } catch (muxErr) {
                console.error("Failed to upload/mux client render on server:", muxErr);
                window.parent.postMessage({
                    type: 'render-error',
                    error: muxErr.message || "Failed to upload/mux client render on server."
                }, '*');
            }
        }

        async function runCanvasRecorderRender(settings) {
            const width = globalWidth;
            const height = globalHeight;
            const fps = settings.fps || 30;
            const duration = settings.duration || 10;

            const masterCanvas = document.createElement('canvas');
            masterCanvas.width = width;
            masterCanvas.height = height;
            const masterCtx = masterCanvas.getContext('2d');

            const stream = masterCanvas.captureStream(fps);

            // Mix audio context directly into MediaRecorder output stream if initialized
            initAudioContext();
            if (audioCtx) {
                try {
                    const audioDest = audioCtx.createMediaStreamDestination();
                    const finalLimiter = window.masterBrickwallLimiter || window.masterLimiter;
                    if (finalLimiter) {
                        finalLimiter.connect(audioDest);
                    }
                    const audioTracks = audioDest.stream.getAudioTracks();
                    if (audioTracks.length > 0) {
                        stream.addTrack(audioTracks[0]);
                        console.log("[Render] Audio node successfully mixed to in-browser recorder.");
                    }
                } catch(e) {
                    console.error("Web Audio MediaStream mix error:", e);
                }
            }

            let chunks = [];
            let mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 5e6
            });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) {
                    chunks.push(e.data);
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                window.parent.postMessage({
                    type: 'render-success',
                    url: URL.createObjectURL(blob)
                }, '*');
            };

            mediaRecorder.start();

            let startTime = performance.now();
            let isRecording = true;

            seekTo(0);
            setPlaybackState(true);

            function drawLoop() {
                if (!isRecording) return;
                
                if (shouldAbortBrowserRender) {
                    isRecording = false;
                    setPlaybackState(false);
                    mediaRecorder.stop();
                    window.parent.postMessage({ type: 'render-error', message: 'Render process aborted by user.' }, '*');
                    return;
                }

                const elapsed = (performance.now() - startTime) / 1000;

                if (elapsed >= duration) {
                    isRecording = false;
                    setPlaybackState(false);
                    mediaRecorder.stop();
                    return;
                }

                seekTo(elapsed);
                compositeFrame(masterCtx);

                window.parent.postMessage({
                    type: 'render-progress',
                    progress: Math.round((elapsed / duration) * 100),
                    frame: Math.round(elapsed * fps),
                    total: Math.round(duration * fps)
                }, '*');

                requestAnimationFrame(drawLoop);
            }

            requestAnimationFrame(drawLoop);
        }

        function reloadAllHTMLTracks(win) {
            try {
                if (!win) return;
                if (win.trackElements) {
                    for (let el of win.trackElements) {
                        if (el.dataset.type === 'html') {
                            el.dataset.loaded = "false";
                            el.dataset.isScriptReady = "false";
                            try {
                                if (el.srcdoc) {
                                    const baseHtml = el.dataset.originalSrcdoc || el.srcdoc;
                                    if (!el.dataset.originalSrcdoc) {
                                        el.dataset.originalSrcdoc = el.srcdoc;
                                    }
                                    el.srcdoc = baseHtml + "\n<!-- reload " + Date.now() + " -->";
                                } else if (el.src) {
                                    const originalSrc = el.dataset.originalSrc || el.src;
                                    if (!el.dataset.originalSrc) {
                                        el.dataset.originalSrc = el.src;
                                    }
                                    const separator = originalSrc.includes('?') ? '&' : '?';
                                    el.src = originalSrc + separator + "reload_t=" + Date.now();
                                }
                            } catch (e) {
                                el.src = el.src;
                            }
                        }
                    }
                }
            } catch (e) {}
        }

        window.addEventListener('message', async (e) => {
            if (!e.data) return;
            // Ignore render trigger messages in nested subproject frames
            try {
                if (window.isParentAccessible() && window.parent && typeof window.parent.isRenderingActive === 'function' && window.parent !== window) {
                    return;
                }
            } catch (err) {}
            if (e.data.type === 'start-in-browser-render') {
                window.isBrowserRendering = true;
                shouldAbortBrowserRender = false;
                try {
                    // Reload all HTML tracks under rendering mode
                    reloadAllHTMLTracks(window);

                    // Wait for initial readiness of all tracks (up to 5 seconds)
                    await new Promise((resolve) => {
                        let checkCount = 0;
                        async function check() {
                            if (window.isReady() || checkCount > 500) {
                                resolve();
                            } else {
                                checkCount++;
                                await workerTimer.delay(10);
                                check();
                            }
                        }
                        check();
                    });

                    if (e.data.renderMode === 'webcodecs') {
                        await runWebCodecsRender(e.data.settings);
                    } else if (e.data.renderMode === 'canvas-rec') {
                        await runCanvasRecorderRender(e.data.settings);
                    }
                } catch (err) {
                    window.parent.postMessage({ type: 'render-error', message: err.message }, '*');
                } finally {
                    window.isBrowserRendering = false;
                    reloadAllHTMLTracks(window);
                }
            } else if (e.data.type === 'abort-in-browser-render') {
                shouldAbortBrowserRender = true;
            }
        });
    </script>
</body>
</html>
